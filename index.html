    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #3a8ee6;
      --primary-light: #5ba8f5;
      --primary-dark: #2271c7;
      --accent: #60c3f5;
      --bg: #f0f6ff;
      --card-bg: #ffffff;
      --nav-bg: #ffffff;
      --text: #1e2d40;
      --text-muted: #8899aa;
      --border: #d6e8f8;
      --shadow: 0 2px 12px rgba(58,142,230,0.08);
      --shadow-hover: 0 8px 32px rgba(58,142,230,0.18);
      --radius: 14px;
      --radius-sm: 8px;
      --tag-bg: linear-gradient(135deg, #3a8ee6, #60c3f5);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    a { text-decoration: none; color: inherit; }

    /* ============ Navbar ============ */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--nav-bg);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--tag-bg);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
      background: var(--tag-bg);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .search-wrap {
      flex: 1;
      max-width: 500px;
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      height: 40px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 0 16px 0 42px;
      font-size: 14px;
      outline: none;
      background: var(--bg);
      color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-wrap input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.12);
    }

    .search-wrap .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      pointer-events: none;
    }

    .search-wrap .clear-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-muted);
      display: none;
    }

    /* ============ Banner ============ */
    .banner {
      background: linear-gradient(135deg, #3a8ee6 0%, #2271c7 50%, #60c3f5 100%);
      color: white;
      text-align: center;
      padding: 40px 24px;
    }

    .banner h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .banner p {
      font-size: 15px;
      opacity: 0.88;
    }

    /* ============ Main Layout ============ */
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 16px;
    }

    .main-layout {
      display: flex;
      gap: 24px;
      padding: 24px 16px;
      max-width: 1280px;
      margin: 0 auto;
    }

    /* ============ Sidebar (分类导航) ============ */
    .sidebar {
      width: 200px;
      flex-shrink: 0;
      position: sticky;
      top: 80px;
      height: fit-content;
      max-height: calc(100vh - 100px);
      overflow-y: auto;
    }

    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .sidebar-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px 8px;
    }

    .sidebar-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      padding: 4px 12px 8px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      color: var(--text);
      transition: all 0.18s;
      cursor: pointer;
    }

    .sidebar-nav a:hover {
      background: rgba(108,99,255,0.08);
      color: var(--primary);
    }

    .sidebar-nav a.active {
      background: rgba(108,99,255,0.12);
      color: var(--primary);
      font-weight: 600;
    }

    .sidebar-nav .count {
      margin-left: auto;
      font-size: 11px;
      background: var(--bg);
      padding: 1px 6px;
      border-radius: 10px;
      color: var(--text-muted);
    }

    /* ============ Content Area ============ */
    .content { flex: 1; min-width: 0; }

    /* ============ 置顶推荐 ============ */
    .featured-section {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 24px;
      overflow: hidden;
    }

    .featured-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(90deg, rgba(108,99,255,0.06), transparent);
    }

    .featured-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 15px;
    }

    .featured-title .star { color: #f5a623; font-size: 18px; }

    .toggle-btn {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 12px;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s;
    }

    .toggle-btn:hover { border-color: var(--primary); color: var(--primary); }

    .featured-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      padding: 20px;
      transition: all 0.3s;
    }

    .featured-grid.collapsed { display: none; }

    /* ============ Category Section ============ */
    .category-section {
      margin-bottom: 32px;
    }

    .category-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--border);

    .category-title {
      font-size: 18px;
      font-weight: 700;
    }

    .category-count {
      background: rgba(108,99,255,0.1);
      color: var(--primary);
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }

    /* ============ Tool Grid ============ */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }

    /* ============ Tool Card ============ */
    .tool-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      position: relative;
      transition: all 0.22s;
      cursor: pointer;
    }

    .tool-card:hover {
      border-color: var(--primary);
      box-shadow: var(--shadow-hover);
      transform: translateY(-3px);
    }

    .rec-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: var(--tag-bg);
      color: white;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .tool-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      object-fit: contain;
      background: var(--bg);
      padding: 4px;
      flex-shrink: 0;
    }

    .tool-icon-placeholder {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: linear-gradient(135deg, #6c63ff22, #ff658422);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .tool-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }

    .tool-desc {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
      flex: 1;
    }

      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 4px;
      background: rgba(108,99,255,0.08);
      color: var(--primary);
      border: none;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s;

      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text-muted);

      text-align: center;

      justify-content: center;
      gap: 8px;
      margin-bottom: 10px;

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 12px;
    }

      font-size: 13px;
      color: var(--text-muted);
      transition: color 0.18s;
    }

    .footer-links a:hover { color: var(--primary); }

    .footer-copy {
      font-size: 12px;
      color: #bbb;
    }

    /* ============ Responsive ============ */
    @media (max-width: 900px) {
      .sidebar { display: none; }
      .main-layout { padding: 16px 12px; }
    }

    @media (max-width: 600px) {
      .navbar { padding: 0 12px; }
      .logo-text { display: none; }
      .tools-grid { grid-template-columns: repeat(2, 1fr); }
      .featured-grid { grid-template-columns: repeat(1, 1fr); }
      .banner h1 { font-size: 22px; }
    }

    /* ============ Scroll Highlight ============ */
    .highlight-flash {
      animation: flashHighlight 1.2s ease;
    }

    @keyframes flashHighlight {
      0%   { box-shadow: 0 0 0 0 rgba(108,99,255,0.5); }
      40%  { box-shadow: 0 0 0 8px rgba(108,99,255,0.2); }
      100% { box-shadow: 0 0 0 0 rgba(108,99,255,0); }
    }
  </style>
</head>

// 渲染工具卡片
function createToolCard(tool) {
  const card = document.createElement('a');
  card.className = 'tool-card';
  card.href = tool.url;
  card.target = '_blank';
  card.rel = 'noopener noreferrer';

  if (tool.rec) {
    const badge = document.createElement('span');
    badge.className = 'rec-badge';
    badge.textContent = '推荐';
    card.appendChild(badge);
  }

  // 图标
  if (tool.icon) {
    const img = document.createElement('img');
    img.className = 'tool-icon';
    img.src = tool.icon;
    img.alt = tool.name;
    img.loading = 'lazy';
    img.onerror = function() {
      this.replaceWith(createEmojiIcon(tool.emoji || tool.name[0]));
    };
    card.appendChild(img);
  } else {
    card.appendChild(createEmojiIcon(tool.emoji || tool.name[0]));
  }

  const name = document.createElement('div');
  name.className = 'tool-name';
  name.textContent = tool.name;
  card.appendChild(name);

  const desc = document.createElement('div');
  desc.className = 'tool-desc';
  desc.textContent = tool.desc;
  card.appendChild(desc);

  const btn = document.createElement('span');
  btn.className = 'visit-btn';
  btn.innerHTML = '立即体验 →';
  card.appendChild(btn);

  return card;
}

function createEmojiIcon(char) {
  const div = document.createElement('div');
  div.className = 'tool-icon-placeholder';
  div.textContent = char;
  return div;
}

// 渲染置顶精选
function renderFeatured() {
  const grid = document.getElementById('featuredGrid');
  FEATURED.forEach(tool => grid.appendChild(createToolCard(tool)));
}

// 渲染侧边栏
function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  CATEGORIES.forEach(cat => {
    const a = document.createElement('a');
    a.href = '#' + cat.id;
    a.innerHTML = `<span>${cat.icon}</span><span>${cat.name}</span><span class="count">${cat.tools.length}</span>`;
    a.addEventListener('click', e => {
      e.preventDefault();
      document.querySelectorAll('.sidebar-nav a').forEach(el => el.classList.remove('active'));
      a.classList.add('active');
      const section = document.getElementById(cat.id);
      if (section) {
        section.scrollIntoView({ behavior: 'smooth', block: 'start' });
        section.classList.add('highlight-flash');
        setTimeout(() => section.classList.remove('highlight-flash'), 1500);
      }
    });
    nav.appendChild(a);
  });
}

// 渲染所有分类
function renderCategories() {
  const container = document.getElementById('categoriesContainer');
  CATEGORIES.forEach(cat => {
    const section = document.createElement('div');
    section.className = 'category-section';
    section.id = cat.id;

    const header = document.createElement('div');
    header.className = 'category-header';
    header.innerHTML = `
      <span style="font-size:22px;">${cat.icon}</span>
      <h2 class="category-title">${cat.name}</h2>
      <span class="category-count">${cat.tools.length} 个工具</span>
    `;
    section.appendChild(header);

    const grid = document.createElement('div');
    grid.className = 'tools-grid';
    cat.tools.forEach(tool => grid.appendChild(createToolCard(tool)));
    section.appendChild(grid);

    container.appendChild(section);
  });
}

// ====================================================
//  搜索功能
// ====================================================
const allTools = CATEGORIES.flatMap(cat =>
  cat.tools.map(t => ({ ...t, catName: cat.name, catIcon: cat.icon }))
);

function doSearch(query) {
  const q = query.trim().toLowerCase();
  const searchResults = document.getElementById('searchResults');
  const categoriesContainer = document.getElementById('categoriesContainer');
  const featuredSection = document.querySelector('.featured-section');

  if (!q) {
    searchResults.style.display = 'none';
    categoriesContainer.style.display = '';
    featuredSection.style.display = '';
    return;
  }

  featuredSection.style.display = 'none';
  categoriesContainer.style.display = 'none';
  searchResults.style.display = '';
  searchResults.innerHTML = '';

  const matched = allTools.filter(t =>
    t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q)
  );

  const title = document.createElement('div');
  title.className = 'search-results-title';
  title.innerHTML = `搜索 "<span>${query}</span>" 共找到 ${matched.length} 个工具`;
  searchResults.appendChild(title);

  if (matched.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'no-results';
    empty.innerHTML = '😕 没有找到相关工具，换个关键词试试？';
    searchResults.appendChild(empty);
    return;
  }

  const grid = document.createElement('div');
  grid.className = 'tools-grid';
  matched.forEach(tool => grid.appendChild(createToolCard(tool)));
  searchResults.appendChild(grid);
}

// ====================================================
//  初始化
// ====================================================
document.addEventListener('DOMContentLoaded', () => {
  renderFeatured();
  renderSidebar();
  renderCategories();

  // 置顶推荐折叠
  const toggleBtn = document.getElementById('featuredToggle');
  const featuredGrid = document.getElementById('featuredGrid');
  toggleBtn.addEventListener('click', () => {
    const collapsed = featuredGrid.classList.toggle('collapsed');
    toggleBtn.textContent = collapsed ? '展开' : '收起';
  });

  // 搜索
  const searchInput = document.getElementById('searchInput');
  const clearBtn = document.getElementById('clearBtn');
  let searchTimer;

  searchInput.addEventListener('input', () => {
    clearBtn.style.display = searchInput.value ? 'block' : 'none';
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => doSearch(searchInput.value), 200);
  });

  clearBtn.addEventListener('click', () => {
    searchInput.value = '';
    clearBtn.style.display = 'none';
    doSearch('');
    searchInput.focus();
  });

  // 滚动监听侧边栏高亮
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const id = entry.target.id;
        document.querySelectorAll('.sidebar-nav a').forEach(a => {
          a.classList.toggle('active', a.getAttribute('href') === '#' + id);
        });
      }
    });
  }, { rootMargin: '-80px 0px -60% 0px' });

  CATEGORIES.forEach(cat => {
    const el = document.getElementById(cat.id);
    if (el) observer.observe(el);
  });
});
</script>
